name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff

      - name: Lint (ruff)
        working-directory: backend
        run: ruff check . --exit-zero  # non-blocking for now; tighten once codebase stabilizes

      - name: Run tests
        working-directory: backend
        env:
          # tests exercise pure functions only — no live DB/NIM key needed
          JWT_SECRET: test-secret-for-ci
        run: pytest -v

  frontend-build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app: [fan-ui, ops-ui]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/${{ matrix.app }}/package-lock.json

      - name: Install and build
        working-directory: frontend/${{ matrix.app }}
        run: |
          npm install
          npm run build
